set-option -sa terminal-overrides ",xterm*:Tc"
set-option -g default-shell /bin/zsh
set-option -g default-command "zsh -l"

#set -g @catppuccin_flavour 'mocha'
#set -g @tokyo-night-tmux_show_datetime 0
#set -g @tokyo-night-tmux_show_path 1
#set -g @tokyo-night-tmux_path_format relative
#set -g @tokyo-night-tmux_window_id_style dsquare
#set -g @tokyo-night-tmux_window_id_style dsquare
#set -g @tokyo-night-tmux_show_git 0

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @plugin 'omerxx/catppuccin-tmux'
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_text "#W"
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'
set -s escape-time 0
set -g history-limit 1000000
set -g renumber-windows on
set -g @catppuccin_meetings_text "#($HOME/.dotfiles/tmux/cal.sh)"

# Session name with hashed color in status bar
set -g status-left "#(~/.local/bin/tmux-session-color) "
set -g status-left-length 30

unbind C-b
unbind C-a
unbind C-g
if-shell 'test -n "$SSH_CONNECTION"' 'set-option -g prefix C-g' 'set-option -g prefix C-a'
if-shell 'test -n "$SSH_CONNECTION"' 'bind-key C-g send-prefix' 'bind-key C-a send-prefix'
if-shell 'test -n "$SSH_CONNECTION"' 'set -g status-position top' 'set -g status-position bottom'
#set -g status-style 'bg=#333333 fg=#5eacd3'

bind r source-file ~/.tmux.conf
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R
bind u run-shell "~/.tmux/plugins/tpm/bin/clean_plugins"

bind -r D neww -c "#{pane_current_path}" "[[ -e TODO.md ]] && nvim TODO.md || nvim ~/.dotfiles/personal/todo.md"

# Topic fuzzy switcher in popup (prefix + f) - fast, uses /bin/sh to skip zshrc
bind-key -r f display-popup -E -w 60% -h 40% -d "#{pane_current_path}" "/bin/sh -c 'git worktree list --porcelain | grep ^branch | sed s,branch.refs/heads/,, | $HOME/.local/bin/fzf --prompt=\"Switch to: \" | xargs -I{} sh -c \"$HOME/.local/bin/wt switch {} && tmux switch-client -t \\$(echo {} | tr / -)\"'"

# Sessionizer for non-worktree projects (prefix + F)
bind-key -r F run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Quick topic session switching with sesh picker (worktrees)
bind-key "T" display-popup -E -w 80% -h 70% "sesh connect \"$(sesh list --icons | fzf --ansi --no-sort)\""

# Quick new topic creation
bind-key "W" display-popup -E -w 60% -h 20% "read -p 'New topic branch: ' b && topic -c \$b"

bind-key -r i run-shell "tmux neww tmux-cht.sh"
bind-key -r G run-shell "~/.local/bin/tmux-sessionizer ~/projects/hari_sdk/"
bind-key -r C run-shell "~/.local/bin/tmux-sessionizer ~/projects"
#open nvim and zsh in current directory
bind-key -r v \
  if-shell "tmux list-windows | grep -q nvim" '' '\
    send-keys "nvim ." Enter; \
    if-shell "tmux list-windows | grep -q \"#{pane_current_path}.*zsh\"" "" "\
      new-window -d -c \"#{pane_current_path}\""'

